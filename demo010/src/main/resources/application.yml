# ============================================================
# demo009 - MyBatis-Plus 配置
# ============================================================

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/student_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

# MyBatis-Plus 配置
mybatis-plus:
  # 实体扫描路径
  type-aliases-package: com.demo009.student.entity
  # 开启驼峰命名自动映射
  configuration:
    map-underscore-to-camel-case: true
  # 全局配置（可选）
  global-config:
    db-config:
      # 主键自增策略
      id-type: auto

# 日志
logging:
  level:
    com.demo009.student.mapper: DEBUG
    root: INFO
