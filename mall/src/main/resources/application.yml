server:
  port: 8080

spring:
  application:
    name: mall

  # ==================== MySQL（mall_db） ====================
  datasource:
    # 本地开发时使用 docker 里的 mall-mysql（端口 3307）
    url: jdbc:mysql://localhost:3307/mall_db?serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ==================== Redis ====================
  data:
    redis:
      # 本地开发时使用 docker 里的 mall-redis（端口 6380）
      host: localhost
      port: 6380
      password: 123456
      timeout: 10s
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 2

  # ==================== MyBatis-Plus ====================
  mybatis-plus:
    configuration:
      map-underscore-to-camel-case: true
      log-impl: org.apache.ibatis.logging.stdout.StdOutImpl   # 开发阶段打印 SQL，生产建议改成日志框架
    global-config:
      db-config:
        id-type: auto
        logic-delete-field: deleted
        logic-delete-value: 1
        logic-not-delete-value: 0

# ==================== 日志（配合 LoggingFilter + MDC） ====================
logging:
  level:
    com.mall: DEBUG
    com.baomidou.mybatisplus: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId}] %-5level %logger{50} - %msg%n"

# ==================== Actuator 健康检查（Docker 关键） ====================
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  health:
    redis:
      enabled: true
    db:
      enabled: true

# ==================== 自定义配置 ====================
mall:
  # 未来可在此扩展各种业务开关
  env: local

# ==================== JWT 配置（Phase 1 Step 3 引入） ====================
jwt:
  secret: mall-secret-key-change-in-production-2026
  expiration: 86400000   # 24小时（毫秒）
